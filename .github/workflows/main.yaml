name: Build, Docker & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      IMAGE_NAME: archopro-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKER_USERNAME}" ] || [ -z "${DOCKER_PASSWORD}" ]; then
            echo "Docker Hub credentials are missing. Set DOCKER_USERNAME/DOCKER_PASSWORD." >&2
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      IMAGE_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          port: ${{ env.SERVER_PORT }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          source: "compose.yml"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          port: ${{ env.SERVER_PORT }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script_stop: true
          envs: DEPLOY_PATH,IMAGE_NAMESPACE,IMAGE_TAG
          script: |
            set -euo pipefail
            mkdir -p "${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            export IMAGE_NAMESPACE="${IMAGE_NAMESPACE}"
            export IMAGE_TAG="${IMAGE_TAG}"

            docker compose pull api
            docker compose up -d --remove-orphans api

            docker container prune -f
            docker image prune -af --filter "until=24h"
            docker builder prune -af --filter "until=24h"

            docker compose ps