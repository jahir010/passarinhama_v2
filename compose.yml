name: archopro

networks:
  server_net:
    external: true

services:
  api:
    image: ${IMAGE_NAMESPACE:-moynul2k3}/archopro-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./media:/app/media
      - ./migrations:/app/migrations
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    stop_grace_period: 30s
    networks:
      - server_net